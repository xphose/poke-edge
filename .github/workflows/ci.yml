name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Server tests
        run: npm run test:server

      - name: Web tests
        run: npm run test:web

      - name: Build
        run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pokegrails:${{ github.sha }} .

      - name: Verify health check
        run: |
          docker run -d --name gp-test -p 3001:3001 \
            -e NODE_ENV=production \
            -e JWT_SECRET=test-ci-secret \
            -e JWT_REFRESH_SECRET=test-ci-refresh \
            pokegrails:${{ github.sha }}
          sleep 10
          curl -f http://localhost:3001/api/health || (docker logs gp-test && exit 1)
          docker stop gp-test
